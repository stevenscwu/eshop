name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Markdown
      uses: DavidAnson/markdownlint-cli2-action@v10
      with:
        globs: '**/*.md'
