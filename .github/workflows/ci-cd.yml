name: eShop CI/CD Pipeline

on:
  push:
    branches: [ main ]   # Change this to match your default branch if needed

permissions:
  id-token: write        # Needed for OIDC login to Azure
  contents: read         # Required to checkout repo

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  COMPOSE_FILE: build/docker-compose.yml
  RESOURCE_GROUP: ${{ secrets.AZURE_RG }}
  CONTAINER_APPS_ENV: ${{ secrets.AZURE_ENV }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login via OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Azure Container Registry (ACR)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }} # You can remove this if using OIDC-only ACR pull

    - name: Build and Push Images via Compose
      run: |
        docker buildx bake --file $COMPOSE_FILE \
          --set *.tags=${{ env.REGISTRY }}/{{.target}}:${{ github.sha }} \
          --push

    - name: Ensure Azure CLI Container App Extension
      run: |
        az extension add --name containerapp --upgrade --yes

    - name: Deploy to Azure Container Apps
      run: |
        az containerapp compose create \
          --environment $CONTAINER_APPS_ENV \
          --resource-group $RESOURCE_GROUP \
          --compose-file-path $COMPOSE_FILE \
          --registry-server $REGISTRY

    - name: Output Gateway URL
      run: |
        GATEWAY=$(az containerapp list -g $RESOURCE_GROUP --query "[?contains(name,'web') || contains(name,'gateway')].name | [0]" -o tsv)
        if [ -n "$GATEWAY" ]; then
          az containerapp show -g $RESOURCE_GROUP -n $GATEWAY --query properties.configuration.ingress.fqdn -o tsv
        else
          echo "No gateway app found"
        fi
