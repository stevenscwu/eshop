name: Trigger SonarQube + GPT pipeline
on:
  push:
    branches:
      - main

jobs:
  SonarQube-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET workloads
        run: dotnet workload restore

      - name: Restore dependencies
        run: dotnet restore ./eShop.sln

      - name: SonarQube Begin Analysis
        run: |
          dotnet sonarscanner begin /k:"eshop" /d:sonar.login="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.inclusions="src/**/*.cs,tests/**/*.cs" /d:sonar.exclusions="**/ClientApp/**,**/HybridApp/**"

      - name: Build
        run: dotnet build ./eShop.sln --no-restore

      - name: SonarQube End Analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

  GPT-4-Summary-via-Azure-Function:
    needs: SonarQube-Scan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Azure Function to summarize
        run: |
          curl -X POST "${{ secrets.GPT_FUNCTION_ENDPOINT }}" \
            -H "Content-Type: application/json" \
            -d '{"projectKey": "eshop"}'
