name: SonarQube + GPT pipeline

on:
  push:
    branches: [ main ]

jobs:
  SonarQube-Scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore src/Ordering.API/Ordering.API.csproj

      - name: SonarQube Begin Analysis
        run: |
          dotnet tool install --global dotnet-sonarscanner
          export PATH="$PATH:/home/runner/.dotnet/tools"
          dotnet sonarscanner begin /k:"eshop" /d:sonar.login="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"

      - name: Build
        run: dotnet build src/Ordering.API/Ordering.API.csproj --no-restore

      - name: SonarQube End Analysis
        run: |
          dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

  GPT-4-Summary-via-Azure-Function:
    needs: SonarQube-Scan
    runs-on: ubuntu-latest
    steps:
      - name: Call GPT-4 Azure Function
        run: |
          curl -X POST "${{ secrets.GPT_FUNCTION_ENDPOINT }}" \
            -H "Content-Type: application/json" \
            --data '{"summary": "Trigger from GitHub Action"}'
