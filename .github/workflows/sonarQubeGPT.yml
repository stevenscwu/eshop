name: SonarQube Scan + GPT Summary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sonar-gpt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"eshop" /d:sonar.host.url="http://13.89.226.182:9000" /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      - name: Call GPT-4 Azure Function for Summary
        env:
          FUNCTION_ENDPOINT: ${{ secrets.GPT_FUNCTION_ENDPOINT }}
        run: |
          echo '{}' > sonar_payload.json  # Replace with actual payload or fetch logic
          curl -X POST "$FUNCTION_ENDPOINT"                -H "Content-Type: application/json"                --data @sonar_payload.json